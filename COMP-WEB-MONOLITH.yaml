component_id: COMP-WEB-MONOLITH
title: Sovereign Web Monolith Architecture
tier: Tier-3-Platform
abstract: Defines the zero-execution structural layout for all public-facing edge nodes to ensure deterministic compliance rendering.

structural_physics:
  desktop_grid:
    container_max_width: "1024px"
    column_ratio: "1fr 280px"
    gap: "64px"
  mobile_matrix:
    breakpoint_tablet: "max-width: 900px" # Sidebar relocates to document flow
    breakpoint_mobile: "max-width: 600px" # Navigation elements flex to 100%

state_machine:
  logic: "Zero JavaScript toggle logic. Hardware-accelerated CSS state only."
  trigger: "<input type=\"checkbox\" id=\"toggle\">"
  reaction: "#toggle:checked ~ .ui .lang-es { display: block !important; }"

print_engine_matrix:
  margins: "0.75in 0.5in"
  typography:
    base_size: "10pt"
    line_height: "1.3"
    orphans_and_widows: "3" # Prevents single lines on page breaks
  visibility_rules:
    hide: [".top-bar", ".sidebar", ".btn", ".digital-disclaimer"]
    show: [".print-contact"]
