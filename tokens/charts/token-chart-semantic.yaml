# CHART TOKENS: Entity-Role → Colour Semantic Mapping
# Maps corporate entity roles to canonical Woodfine palette tokens.
# Source: woodfine-media-assets/token-global-color.yaml
# Consumed by: org-chart component CSS (--wf-* custom properties)
schema: foundry-token-v1
version: "1.0.0"
created: 2026-05-20

entity-roles:
  holding-company:
    token: woodfine-green
    hex: "#54924E"
    tint: "#EEF6EC"
    border: "2px solid"
    note: "Parent companies, WCP, MCorp — solid bordered rectangle"
  gp-admin:
    token: woodfine-blue
    hex: "#164679"
    tint: "#E8EFF7"
    border: "2px solid"
    note: "General Partners, administrators, subsidiaries"
  direct-hold:
    token: woodfine-amber
    hex: "#F57F17"
    tint: "#FFF3E0"
    border: "2px dashed"
    shape: "pill (110px border-radius)"
    note: "Direct-Hold Solutions — always pill shape, dashed border"
  spv-flow-through:
    token: woodfine-blue
    hex: "#164679"
    tint: "#E8EFF7"
    border: "2px dotted"
    shape: "ellipse"
    note: "Cross-Border Flow-Through SPVs — dotted ellipse"
  broker-dealer:
    token: woodfine-orange
    hex: "#F15F22"
    tint: "#FDE8DD"
    border: "2px solid"
    note: "Sales agreements, broker-dealers, referral channels"
  advisory:
    token: woodfine-purple
    hex: "#7C468C"
    tint: "#EEE6F1"
    border: "2px solid"
    note: "Advisory entities, AIFM, fund managers (external)"
  access-fund:
    token: woodfine-orange
    hex: "#F15F22"
    tint: "#FDE8DD"
    border: "2px dashed"
    shape: "ellipse"
    note: "ELTIF / Access Fund wrapper — dashed ellipse"
  inactive:
    token: woodfine-grey-mid
    hex: "#6B7280"
    opacity: "0.35"
    filter: "grayscale(20%)"
    note: "Planned/future jurisdictions not yet active"
  neutral:
    token: woodfine-grey-mid
    hex: "#6B7280"
    tint: "#e9ecef"
    border: "2px solid"
    note: "Trustee banks, title companies, debt instruments"

connector-colors:
  ownership:      { token: woodfine-green,  hex: "#54924E", style: solid }
  management:     { token: woodfine-blue,   hex: "#164679", style: solid }
  distribution:   { token: woodfine-amber,  hex: "#F57F17", style: solid }
  referral:       { token: woodfine-orange, hex: "#F15F22", style: dashed }
  advisory:       { token: woodfine-purple, hex: "#7C468C", style: solid }
  structural:     { token: woodfine-grey-mid, hex: "#6B7280", style: dashed }

canvas:
  width-px: 1056
  height-px: 816
  orientation: landscape
  paper: letter
  note: "All charts use this fixed print canvas. Matches CSS @page rule."

token-node-sizes:
  base:    { width: "210px", height: "110px", class: "org-token" }
  sm:      { width: "170px", height: "90px",  class: "org-token--sm" }
  compact: { width: "170px", height: "60px",  class: "org-token--compact" }
