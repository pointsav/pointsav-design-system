protocol_name: DESIGN
standard: Universal Sovereign Disclosure
description: The instruction set for user interfaces. It enforces optical layout preservation and Institutional Brutalism.

operational_rules:
  optical_preservation:
    enforcement_rule: "Render UI strictly using HTML-aligned tables and native alert blocks."
  
  typography_mandate:
    enforcement_rule: "Use strictly monospace or highly legible sans-serif for data rendering."
    prohibit_animations: true
