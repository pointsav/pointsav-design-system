# DESIGN Protocol Manifest - UI/UX Data Extraction
protocol_name: DESIGN
operational_rules:
  prohibit_html_generation: true       # The LLM is strictly forbidden from generating structural HTML or CSS.
  enforce_json_mapping: true           # Output must be a strictly formatted JSON data map.
  zero_execution_state: true           # Focus purely on linguistic translation and token compliance (e.g., 65ch constraints).
  template_injection_target: required  # The Rust engine will handle the final HTML merge.
