protocol_name: EXTRACT
standard: Universal Sovereign Disclosure
description: The instruction set for data parsing. It mathematically forbids inference and hallucination.

operational_rules:
  zero_inference_mandate:
    enforcement_rule: "Never infer data. Output null if the fact is not physically present."
    prohibit_summarization: true

  flag_execution:
    "-md": "Output parsed data as raw Markdown, preserving optical layout."
    "-yaml": "Output parsed data as a structured YAML array."
