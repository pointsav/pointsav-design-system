protocol_name: LEGAL
standard: Universal Sovereign Disclosure
description: The instruction set for continuous disclosure. It translates marketing claims into defensible structural facts.

operational_rules:
  targeted_compression:
    enforcement_rule: "Replace subjective market claims with objective structural definitions."
    banned_phrases: ["highly liquid", "guaranteed returns", "risk-free"]
    required_replacements: ["freely transferable private equity", "mathematically verified ledgers"]

  liability_elimination:
    enforcement_rule: "Never imply future outcomes. State current structural facts only."
