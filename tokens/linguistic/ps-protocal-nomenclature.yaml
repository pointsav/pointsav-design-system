engineering_logic:
  - prefix: "os-*"
    category: "Foundation"
    architectural_definition: "Microkernel boundaries and infrastructure execution."
    strict_execution_rule: "Operates strictly below the application layer. Zero user-facing interfaces."
  - prefix: "app-*"
    category: "Interface"
    architectural_definition: "Packaged, user-facing environments or delivery vehicles."
    strict_execution_rule: "Provides the isolated interface or gateway for data routing."
  - prefix: "service-*"
    category: "Autonomous"
    architectural_definition: "Background engines, daemons, and un-attended processing loops."
    strict_execution_rule: "Must operate asynchronously without human intervention. Zero UI."
  - prefix: "tool-*"
    category: "Operational"
    architectural_definition: "Manual scripts, administrative levers, or diagnostic probes."
    strict_execution_rule: "Requires explicit operator execution or strictly scoped chronological triggers (cron). Never runs as a permanent daemon."
  - prefix: "vendor-*"
    category: "Third-Party"
    architectural_definition: "Quarantined dependencies or legacy bridges."
    strict_execution_rule: "Must remain cryptographically isolated from Sovereign logic."
  - prefix: "Moonshot-*"
    category: "Strategic R&D"
    architectural_definition: "Experimental frameworks engineered to replace Tier-0 legacy debt (e.g., C-language kernels, vendor drivers) with memory-safe Sovereign Rust alternatives."
    strict_execution_rule: "Prohibited from active production routing. Must operate in strict isolation until formally verified to replace an existing foundational component."

deployment_logic:
  - prefix: "fleet-"
    description: "Denotes a grouping of physical or virtual infrastructure nodes."
  - prefix: "route-"
    description: "Denotes a network administration or routing pathway."
  - prefix: "gateway-"
    description: "Denotes an aggregation point bridging different architectures."
  - prefix: "cluster-"
    description: "Denotes a logical grouping of distinct, contained asset micro-kernels (Toteboxes)."
  - prefix: "node-"
    description: "Denotes an individual user terminal endpoint."
  - prefix: "media-"
    description: "Denotes a public or internal web distribution deployment."
  - prefix: "vault-"
    description: "Denotes a highly secure, isolated storage or version control deployment."
