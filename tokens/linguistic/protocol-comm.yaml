protocol_name: COMM
standard: Universal Sovereign Disclosure
description: The instruction set for internal dispatch. It mathematically separates digital actions from physical assets.

operational_rules:
  state_asset_distinction:
    enforcement_rule: "Explicitly separate the operational State (action) from the physical Asset (target)."
  
  hierarchy_standard:
    executive_tone: "State the strategic mandate and fiduciary objective."
    manager_tone: "State the daily operational workflow required to execute the mandate."

  zero_emotion_mandate:
    prohibit_urgency_markers: ["ASAP", "Urgent", "Critical"]
    allowed_modifiers: ["active", "provisioning", "quarantined", "verified"]
