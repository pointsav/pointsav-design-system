protocol_name: TEXT
standard: Universal Sovereign Disclosure
description: Strict linguistic and visual protocol for Sovereign Repository documentation, enforcing Bloomberg Terminal aesthetics and objective engineering facts.
operational_rules:
  # 1. Engineering Factuality (BCSC Alignment)
  prohibit_forward_looking_statements: true  # Do not use "will", "plans to", or "is going to". State current physical reality.
  anti_puffery_mandate: true                 # Ban: seamless, robust, revolutionary, disrupt, leverage, state-of-the-art.
  factual_state_reporting: true              # Use objective noun-verb constructs (e.g., "This engine executes X").

  # 2. Institutional Brutalism Aesthetic
  minto_pyramid_structure: true              # Conclusions and execution commands precede all explanatory text.
  plain_language: true                       # Enforce ISO 24495-1 standard. Short, declarative sentences. Maximum 15 words.
  flat_visual_hierarchy: true                # Prohibit nested bullet points. Use standard Markdown tables for data matrices.
  bilingual_symmetry: true                   # Maintain exact 1-to-1 EN/ES structural mirroring.

  # 3. Topographical Layouts (Cross-Linking)
  enforce_readme_templates: true
  templates:
    navigation_ledger: "All repositories must contain a top-level centered blockquote or divider mapping direct links to sibling repositories."
output_format: "Standard Markdown (.md). Use strict bolding for emphasis. Prefer tables over lists for data."
