protocol_name: TEXT
standard: Universal Sovereign Disclosure
description: The root instruction set for generating corporate documentation. It enforces Institutional Brutalism.

operational_rules:
  sentence_structure:
    max_word_count: 15
    mood_mandate: "Imperative and declarative facts only."
    prohibit_complex_clauses: true

  zero_puffery_mandate:
    enforcement_rule: "If an adjective does not describe a mathematical or physical state, purge it."
    banned_adjectives: ["seamless", "revolutionary", "best-in-class", "innovative"]

  objective_identity:
    prohibit_first_person: true
    allowed_roles: ["The Executive", "The Manager", "The Contributor", "The System Vendor", "The Customer"]
