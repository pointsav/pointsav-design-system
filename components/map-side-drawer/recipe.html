<!DOCTYPE html>
<!--
  COMPONENT: ps-map-drawer
  Target repo: pointsav-design-system
  Carbon baseline: Side-panel (tightened for map-overlay use)
  Accessibility: WCAG 2.2 AA / role-complementary / focus-trap / ESC dismiss / focus-visible
  Brand voice: confident · direct · data-forward
  DTCG tokens: ps.map-drawer.* (tokens/dtcg-bundle.json)

  Ratified: master-claude (workspace v0.1.94 session, 2026-04-30)
  Received: project-design gateway 2026-05-23

  When to use:
  - User clicks a feature on a customer-public map and wants to read about it
    without losing map context (retail co-location, BIM envelope, cluster comparison)

  When not to use:
  - Transient confirmation messages (use toast/snackbar)
  - Interactions that block map use (use modal)

  Divergences from Carbon Side-panel:
  - 340px fixed width (Carbon: 320px responsive) — map overlay does not reflow
  - 250ms cubic-bezier(0.16, 1, 0.3, 1) ease (Carbon: default ease)
  - Inset shadow on left edge (depth cue; no full overlay scrim)
  - Brand badge at top-left in title block (not Carbon's leading icon slot)
  - aria-modal="false" — map remains pannable/zoomable behind the drawer

  Focus protocol:
  - On open: focus moves to first interactive element inside drawer
  - While open: Tab cycles within drawer (focus trap)
  - ESC: dismiss + return focus to map canvas
  - Replacing content (click another feature): replace, do not close/re-open
-->

<aside class="ps-map-drawer"
       role="complementary"
       aria-label="Anchor details"
       aria-modal="false">

  <header class="ps-map-drawer__header">
    <!-- Brand badge: visible text + aria-label carries family name -->
    <span class="ps-brand-badge ps-brand-badge--hardware"
          aria-label="Hardware family">HD</span>

    <h2 class="ps-map-drawer__title">
      Home Depot — Bellingham Bakerview
    </h2>

    <button type="button"
            class="ps-map-drawer__close"
            aria-label="Close details">
      <!-- SVG close icon -->
      <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16">
        <path d="M2 2l12 12M14 2L2 14" stroke="currentColor" stroke-width="2"
              stroke-linecap="round"/>
      </svg>
    </button>
  </header>

  <!-- Facts grid: dl/dt/dd for accessible label-value pairs -->
  <dl class="ps-map-drawer__facts">
    <div class="ps-map-drawer__fact-row">
      <dt class="ps-map-drawer__fact-label">Address</dt>
      <dd class="ps-map-drawer__fact-value">4255 Meridian St, Bellingham WA 98226</dd>
    </div>
    <div class="ps-map-drawer__fact-row">
      <dt class="ps-map-drawer__fact-label">NAICS</dt>
      <dd class="ps-map-drawer__fact-value">444110</dd>
    </div>
    <div class="ps-map-drawer__fact-row">
      <dt class="ps-map-drawer__fact-label">Open</dt>
      <dd class="ps-map-drawer__fact-value">2002</dd>
    </div>
  </dl>

  <!-- Cluster context block: only rendered when feature has a parent cluster -->
  <section class="ps-map-drawer__cluster-context"
           aria-label="Cluster context">
    <p class="ps-map-drawer__cluster-summary">
      Within Corridor 7 &mdash; 4 anchors &middot; 730m max separation
    </p>
  </section>

  <!-- BCSC forward-looking banner: use ps-disclosure-banner when content is forward-looking -->
  <!--
  <div class="ps-disclosure-banner" role="note">
    <span>Planned / intended information. Subject to change.</span>
  </div>
  -->

</aside>


<!-- === CSS TOKENS (reference) === -->
<style>
.ps-map-drawer {
  position: fixed;
  top: 0;
  right: 0;
  height: 100%;
  width: var(--ps-map-drawer-width, 340px);
  background-color: var(--ps-map-drawer-bg, var(--ps-surface-elevated));
  border-left: 1px solid var(--ps-map-drawer-border-color, var(--ps-border-subtle));
  box-shadow: var(--ps-map-drawer-shadow, var(--ps-shadow-side-panel));
  padding: var(--ps-map-drawer-padding, 16px);
  overflow-y: auto;
  transform: translateX(100%);
  transition:
    transform var(--ps-map-drawer-transition-duration, 250ms)
    var(--ps-map-drawer-transition-easing, cubic-bezier(0.16, 1, 0.3, 1));
  z-index: var(--ps-z-drawer, 400);
}

/* Open state: set via JS by adding ps-map-drawer--open */
.ps-map-drawer--open {
  transform: translateX(0);
}

.ps-map-drawer__header {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-bottom: 16px;
}

.ps-map-drawer__title {
  flex: 1;
  font: var(--ps-map-drawer-title-font, var(--ps-heading-03));
  margin: 0;
}

.ps-map-drawer__close {
  flex-shrink: 0;
  background: none;
  border: none;
  cursor: pointer;
  padding: 4px;
  color: var(--ps-text-primary);
}

.ps-map-drawer__close:focus-visible {
  outline: 2px solid var(--ps-focus-color, var(--ps-brand-primary));
  outline-offset: 2px;
}

.ps-map-drawer__facts {
  margin: 0;
  display: grid;
  row-gap: 8px;
}

.ps-map-drawer__fact-row {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 4px;
}

.ps-map-drawer__fact-label {
  font: inherit;
  color: var(--ps-map-drawer-fact-label-color, var(--ps-text-secondary));
  font-size: var(--ps-caption-01-font-size);
}

.ps-map-drawer__fact-value {
  color: var(--ps-map-drawer-fact-value-color, var(--ps-text-primary));
  margin: 0;
}

/* Reduced motion: opacity-only transition */
@media (prefers-reduced-motion: reduce) {
  .ps-map-drawer {
    transition:
      opacity var(--ps-map-drawer-transition-duration, 250ms) ease;
    transform: none;
    opacity: 0;
    pointer-events: none;
  }
  .ps-map-drawer--open {
    opacity: 1;
    pointer-events: auto;
  }
}
</style>
