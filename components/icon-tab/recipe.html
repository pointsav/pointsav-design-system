<!DOCTYPE html>
<!--
  COMPONENT: wf-icon-tab
  Target repo: pointsav-design-system
  Carbon baseline: Button (icon-leading variant) — filled brand style, external link
  Accessibility: WCAG 2.2 AA / aria-label-external / focus-visible / rel-noopener
  Brand voice: confident · direct · institutional
  DTCG tokens: wf.icon-tab.* — see recipe.css for current token references

  Ratified: project-marketing → project-design gateway 2026-05-23

  Originated from: home.woodfinegroup.com subnav
  Use case: Manifest button beside BIM Library and Location Intelligence tabs

  When to use:
  - Subnav bar egress link to an external platform (GitHub, Figma, Notion, etc.)
  - Needs to be visually consistent with sibling navigation tabs
  - Link always opens in a new tab

  When not to use:
  - Internal navigation (use standard tab component)
  - Toggle or state-change action (use button)
  - When link does not open in a new tab (omit "(opens in new tab)" from label)

  Open questions (pending project-design decision):
  1. Inline SVG vs CSS background-image icon slot: current implementation uses inline SVG
     for currentColor inheritance. Background-image approach removes HTML dependency on
     icon content but loses colour inheritance.
  2. Ghost variant: should template-agnostic-ui.html .btn (bordered, light background)
     be registered as wf-icon-tab--ghost, or treated as a separate icon-btn component?

  Icon asset: tokens/ASSET-ICON-GITHUB.svg (16×16, fill=currentColor, in registry)
-->

<!-- === GITHUB VARIANT (canonical first use) === -->
<a class="wf-icon-tab wf-icon-tab--github"
   href="{{HREF}}"
   target="_blank"
   rel="noopener"
   aria-label="{{ARIA_LABEL}} (opens in new tab)">
