<!DOCTYPE html>
<!--
  COMPONENT: ps-freshness-ribbon
  Target repo: pointsav-design-system
  Carbon baseline: Tag (muted informational variant — non-interactive; see divergence notes)
  Accessibility: WCAG 2.2 AA / colour-not-sole-differentiator / aria-label / reader-toggle
  Brand voice: confident · direct · professional
  DTCG tokens: component.article.freshness-ribbon.* (tokens/dtcg-bundle.json)

  Ratified decisions (project-design gateway 2026-05-01):
  - Display format: ISO date (YYYY-MM-DD) — most precise; easiest to render;
    monospace font emphasises technical / date-stamp register
  - Reader-preference default: on by default — ribbons visible without toggle
    Toggle pattern: :root[data-freshness-display="off"] hides all ribbons
  - Three-stop semantic fixed: fresh / stale / archived
  - Thresholds: 90 days (fresh), 365 days (stale) — token-overrideable per deployment
  - data-source attribute: "git-blame" | "frontmatter-review" — engine writes this

  When to use:
  - Every section heading (<h2>/<h3>) on articles with freshness_ribbon: true
  - Any deployment where per-section content-review currency is a meaningful signal

  When not to use:
  - Stub articles or pre-build status with no review history
  - Article title <h1> (ribbon attaches only to section headings)
  - When reader has toggled freshness off via :root[data-freshness-display="off"]

  Divergences from Carbon Tag:
  - Carbon Tag is interactive (filter chip). Freshness ribbon is informational only
    — the date is not clickable
  - Strict 3-stop semantic (fresh/stale/archived) vs Carbon Tag's open 8-colour set
  - Monospace font for the date string (IBM Plex Mono) — datestamp register, not label register
  - margin-left: auto in the section heading flex context pushes to right end of row

  Three-stop token threshold documentation (per DTCG number tokens):
  - fresh:    dateModified within 90 days of render date
  - stale:    dateModified 91–365 days before render date
  - archived: dateModified > 365 days before render date
-->

<article class="ps-article">

  <!-- Section with fresh ribbon (reviewed within 90 days) -->
  <h2 class="ps-article__section-heading">
    Background
    <a class="ps-article__section-edit"
       href="?action=edit&section=2"
       aria-label="Edit section: Background">[edit]</a>
    <span class="ps-freshness-ribbon ps-freshness-ribbon--fresh"
          data-source="git-blame"
          data-iso="2026-03-15"
          aria-label="Last reviewed 2026-03-15 — fresh">
      2026-03-15
    </span>
  </h2>
  <p>Section body content here.</p>

  <!-- Section with stale ribbon (91–365 days) -->
  <h2 class="ps-article__section-heading">
    Current implementations
    <a class="ps-article__section-edit"
       href="?action=edit&section=3"
       aria-label="Edit section: Current implementations">[edit]</a>
    <span class="ps-freshness-ribbon ps-freshness-ribbon--stale"
          data-source="git-blame"
          data-iso="2024-09-12"
          aria-label="Last reviewed 2024-09-12 — stale, over a year ago">
      2024-09-12
    </span>
  </h2>
  <p>Section body content here.</p>

  <!-- Section with archived ribbon (> 365 days); data-source via frontmatter override -->
  <h2 class="ps-article__section-heading">
    Historical context
    <a class="ps-article__section-edit"
       href="?action=edit&section=4"
       aria-label="Edit section: Historical context">[edit]</a>
    <span class="ps-freshness-ribbon ps-freshness-ribbon--archived"
          data-source="frontmatter-review"
          data-iso="2022-11-04"
          aria-label="Last reviewed 2022-11-04 — archived, content under historical review only">
      2022-11-04
    </span>
  </h2>
  <p>Section body content here.</p>

</article>

<!--
  Reader-preference toggle (site-wide — persisted in localStorage):
  When the reader sets freshness display off, add data-freshness-display="off"
  to the <html> element. All ribbons hide via the CSS rule:
  :root[data-freshness-display="off"] .ps-freshness-ribbon { display: none; }
-->
