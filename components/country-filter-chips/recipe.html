<!DOCTYPE html>
<!--
  COMPONENT: ps-country-chips
  Target repo: pointsav-design-system
  Carbon baseline: Tag (selected variant) + content-switcher
  Accessibility: WCAG 2.2 AA / role-radiogroup / focus-visible / keyboard-arrow-nav
  Brand voice: confident · direct · geographic
  DTCG tokens: ps.chip.* (tokens/dtcg-bundle.json)

  Ratified: master-claude (workspace v0.1.94 session, 2026-04-30)
  Received: project-design gateway 2026-05-23

  When to use:
  - Multi-country location intelligence surfaces
  - Customer-portfolio dashboards spanning multiple jurisdictions
  - Future: multi-jurisdictional disclosure surfaces (BCSC + EU)

  When not to use:
  - Layer toggles (use checkbox component)
  - View-state modes (use Carbon content-switcher)

  Divergences from Carbon:
  - Carbon content-switcher is designed for view-state switching, not data filtering.
  - Carbon Tag (selected) has no exclusive-selection group semantics built in.
  - This component sits between Tag and content-switcher: pill shape, radiogroup
    semantics, with flyTo map side-effect on selection.
  - Multi-select variant changes radiogroup → group and aria-checked → aria-pressed.

  Layout note: chips grow horizontally; add overflow-x: auto past N=8 chips.
  Minimum chip height 44px (WCAG 2.2 target size AAA compliance).
-->

<!-- === DEFAULT VARIANT: Exclusive selection (radiogroup) === -->
<div class="ps-country-chips" role="radiogroup"
     aria-label="Filter by country">

  <button type="button"
          class="ps-chip ps-chip--active"
          role="radio"
          aria-checked="true">
    ALL
  </button>

  <button type="button"
          class="ps-chip"
          role="radio"
          aria-checked="false">
    <!-- Flag emoji is supplementary; ISO code carries the semantic meaning -->
    🇺🇸 US
  </button>

  <button type="button"
          class="ps-chip"
          role="radio"
          aria-checked="false">
    🇨🇦 CA
  </button>

  <button type="button"
          class="ps-chip"
          role="radio"
          aria-checked="false">
    🇲🇽 MX
  </button>

  <button type="button"
          class="ps-chip"
          role="radio"
          aria-checked="false">
    🇪🇸 ES
  </button>

</div>


<!-- === MULTI-SELECT VARIANT === -->
<!--
  Changes semantics: radiogroup → group, aria-checked → aria-pressed.
  ALL chip becomes a "clear all" affordance when any country is active.
  Open question: when multi-select active, does ALL disable or clear?
  Decision pending first multi-select use-case.
-->
<div class="ps-country-chips ps-country-chips--multi" role="group"
     aria-label="Filter by country">

  <button type="button"
          class="ps-chip ps-chip--active"
          aria-pressed="false"
          aria-label="Clear all country filters">
    ALL
  </button>

  <button type="button"
          class="ps-chip ps-chip--active"
          aria-pressed="true">
    🇺🇸 US
  </button>

  <button type="button"
          class="ps-chip ps-chip--active"
          aria-pressed="true">
    🇨🇦 CA
  </button>

</div>


<!-- === CSS TOKENS (reference) === -->
<style>
.ps-country-chips {
  display: flex;
  flex-wrap: nowrap;
  gap: var(--ps-chip-gap, var(--ps-spacing-08));
  overflow-x: auto;
  /* Prevent iOS momentum scroll from interfering with map pan */
  -webkit-overflow-scrolling: touch;
}

.ps-chip {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  height: var(--ps-chip-height, 44px);
  padding: var(--ps-chip-padding, 0 12px);
  border-radius: var(--ps-chip-border-radius, 22px); /* full pill */
  background-color: var(--ps-chip-bg-default, var(--ps-surface));
  color: var(--ps-chip-fg-default, var(--ps-text-primary));
  border: 1px solid var(--ps-chip-border-default, var(--ps-border-subtle));
  font: var(--ps-chip-font, var(--ps-body-compact-01));
  cursor: pointer;
  white-space: nowrap;
  transition: background-color var(--ps-chip-transition-duration, 150ms) ease,
              border-color var(--ps-chip-transition-duration, 150ms) ease,
              color var(--ps-chip-transition-duration, 150ms) ease;
}

/* Selected state signalled by background + border + aria-checked/pressed (not colour alone) */
.ps-chip--active,
.ps-chip[aria-checked="true"],
.ps-chip[aria-pressed="true"] {
  background-color: var(--ps-chip-bg-selected, var(--ps-brand-primary));
  color: var(--ps-chip-fg-selected, var(--ps-text-on-brand));
  border-color: var(--ps-chip-border-selected, var(--ps-brand-primary));
}

.ps-chip:focus-visible {
  outline: 2px solid var(--ps-focus-color, var(--ps-brand-primary));
  outline-offset: 2px;
}

@media (prefers-reduced-motion: reduce) {
  .ps-chip {
    transition: none;
  }
}
</style>
