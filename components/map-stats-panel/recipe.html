<!DOCTYPE html>
<!--
  COMPONENT: ps-map-stats
  Target repo: pointsav-design-system
  Carbon baseline: Tile (with-stat variant; tightened for reactive map use)
  Accessibility: WCAG 2.2 AA / role-region / aria-live-polite / landmark
  Brand voice: confident · direct · data-forward
  DTCG tokens: ps.map-stats.* (tokens/dtcg-bundle.json)

  Ratified: master-claude (workspace v0.1.94 session, 2026-04-30)
  Received: project-design gateway 2026-05-23

  When to use:
  - Customer-public map surface with aggregate-able data (counts, averages, grades)
  - Constant visibility of aggregates as filters change is valuable

  When not to use:
  - Transient feedback (use toast/snackbar)
  - On-demand data (use drawer / collapsible panel)

  Divergences from Carbon Tile:
  - Carbon Tile is static; this component is reactive to filter state.
  - aria-live="polite" added so filter-driven value changes are announced.
  - Floating position (top-right map corner) vs Carbon tile in document flow.
  - 200ms fade transition on value update (CLS-safe; no layout shift).

  Aria-live note:
  - "polite" announces updates without interrupting current speech.
  - Do NOT use "assertive" — filter changes are informational, not urgent.

  Stat cell label rule:
  - <dd> carries aria-label spelling out the full value + unit
    e.g. aria-label="12 corridors" so screen readers say "12 corridors"
    rather than just "12".
-->

<!-- === DEFAULT VARIANT: 4-cell 2×2 grid === -->
<aside class="ps-map-stats"
       role="region"
       aria-label="Map statistics"
       aria-live="polite"
       aria-atomic="false">

  <dl class="ps-map-stats__grid">

    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Corridors</dt>
      <dd class="ps-map-stats__value" aria-label="12 corridors">12</dd>
    </div>

    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Anchors</dt>
      <dd class="ps-map-stats__value" aria-label="41 anchors">41</dd>
    </div>

    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Countries</dt>
      <dd class="ps-map-stats__value" aria-label="4 countries">4</dd>
    </div>

    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Avg cluster grade</dt>
      <dd class="ps-map-stats__value" aria-label="less than 1 kilometre average cluster grade">&lt;1km</dd>
    </div>

  </dl>

</aside>


<!-- === COMPACT VARIANT: 2-cell horizontal === -->
<aside class="ps-map-stats ps-map-stats--compact"
       role="region"
       aria-label="Filtered map statistics"
       aria-live="polite"
       aria-atomic="false">

  <dl class="ps-map-stats__grid">
    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Anchors</dt>
      <dd class="ps-map-stats__value" aria-label="17 anchors">17</dd>
    </div>
    <div class="ps-map-stats__cell">
      <dt class="ps-map-stats__label">Corridors</dt>
      <dd class="ps-map-stats__value" aria-label="5 corridors">5</dd>
    </div>
  </dl>

</aside>


<!-- === CSS TOKENS (reference) === -->
<style>
.ps-map-stats {
  position: absolute;
  top: var(--ps-map-stats-position-top, 16px);
  right: var(--ps-map-stats-position-right, 16px);
  background-color: var(--ps-map-stats-bg, var(--ps-surface-elevated));
  border-radius: var(--ps-map-stats-border-radius, 8px);
  box-shadow: var(--ps-map-stats-shadow, var(--ps-shadow-floating));
  padding: var(--ps-map-stats-padding, 12px);
  z-index: var(--ps-z-map-overlay, 300);
  pointer-events: none; /* panel is read-only; map interaction passes through */
}

.ps-map-stats__grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: var(--ps-map-stats-gap, 8px);
  margin: 0;
}

.ps-map-stats--compact .ps-map-stats__grid {
  grid-template-columns: repeat(2, auto);
  grid-template-rows: 1fr;
}

.ps-map-stats__cell {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.ps-map-stats__value {
  /* AA: 7:1 contrast ratio — heading-level size increases legibility */
  font: var(--ps-map-stats-value-font, var(--ps-heading-04));
  color: var(--ps-map-stats-value-color, var(--ps-text-primary));
  margin: 0;
  /* Number-update fade transition — does not cause layout shift */
  transition: opacity var(--ps-map-stats-transition-duration, 200ms) ease;
}

.ps-map-stats__label {
  /* AA: 4.5:1 contrast ratio */
  font: var(--ps-map-stats-label-font, var(--ps-caption-01));
  color: var(--ps-map-stats-label-color, var(--ps-text-secondary));
}

@media (prefers-reduced-motion: reduce) {
  .ps-map-stats__value {
    transition: none;
  }
}
</style>
