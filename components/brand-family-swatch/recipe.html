<!DOCTYPE html>
<!--
  COMPONENT: ps-brand-family-swatch
  Target repo: pointsav-design-system
  Carbon baseline: Tag (with-icon variant)
  Accessibility: WCAG 2.2 AA / colour-not-sole-channel / high-contrast-mode / aria-label
  Brand voice: confident · direct · data-forward · taxonomic
  DTCG tokens: ps.brand-family.* / ps.swatch.* (tokens/dtcg-bundle.json)

  Ratified: master-claude (workspace v0.1.94 session, 2026-04-30)
  Received: project-design gateway 2026-05-23

  Taxonomy source-of-truth: pois.json `brand_family` field
  (Department / Hardware / Warehouse Club — operator-ratified 2026-04-30)

  Component is taxonomy-agnostic: customers extend via runtime taxonomy file
  per leapfrog invention #5 (brand-family taxonomy as sovereign data layer).

  When to use:
  - Map markers grouped by brand-family
  - Tabular data filtering by brand-family
  - Drawer / detail header chip
  - Cluster centroid multi-family ring (see cluster-centroid variant below)

  When not to use:
  - Binary states, transient feedback, non-taxonomic categorisation
    (use tag, badge, or status-indicator instead)

  Divergences from Carbon Tag:
  - Carbon Tag is a static label only; this component adds a semantic dot
    as the primary visual channel (colour + shape, not colour alone).
  - Cluster-centroid ring variant has no Carbon equivalent.
  - Runtime taxonomy resolution (unknown family-ids fall back gracefully).
-->

<!-- === VARIANT: Inline chip (default) === -->
<!--
  Use for map filter rows, drawer header badges, table cells.
  Dot is aria-hidden; label carries semantic meaning.
  Colour is supplementary — label is the primary signifier.
-->
<span class="ps-swatch ps-swatch--department" aria-label="Department family">
  <span class="ps-swatch__dot" aria-hidden="true"></span>
  <span class="ps-swatch__label">Department</span>
</span>

<span class="ps-swatch ps-swatch--hardware" aria-label="Hardware family">
  <span class="ps-swatch__dot" aria-hidden="true"></span>
  <span class="ps-swatch__label">Hardware</span>
</span>

<span class="ps-swatch ps-swatch--warehouse-club" aria-label="Warehouse Club family">
  <span class="ps-swatch__dot" aria-hidden="true"></span>
  <span class="ps-swatch__label">Warehouse Club</span>
</span>


<!-- === VARIANT: Map marker (large dot, label suppressed) === -->
<!--
  Use as the visual foundation for ps-map-marker--anchor.
  Dot is 24–32px; label delivered via parent tooltip / drawer.
  aria-label on the marker parent carries the family name.
-->
<span class="ps-swatch ps-swatch--department ps-swatch--map-marker"
      aria-label="Department anchor">
  <span class="ps-swatch__dot" aria-hidden="true"></span>
</span>


<!-- === VARIANT: Cluster-centroid ring === -->
<!--
  Renders the family distribution within a co-location cluster.
  One .ps-swatch__ring-segment per family present in the cluster.
  Reveal-by-zoom: only visible at zoom < 8.5 (MapLibre maxzoom: 8.5).
  No equivalent in Carbon; composed from radial SVG positioning.
-->
<span class="ps-swatch-centroid" role="img"
      aria-label="Cluster: 1 Department, 2 Hardware, 1 Warehouse Club">
  <span class="ps-swatch-centroid__segment ps-swatch-centroid__segment--department"
        aria-hidden="true"></span>
  <span class="ps-swatch-centroid__segment ps-swatch-centroid__segment--hardware"
        aria-hidden="true"></span>
  <span class="ps-swatch-centroid__segment ps-swatch-centroid__segment--warehouse-club"
        aria-hidden="true"></span>
</span>


<!-- === VARIANT: Filter row (checkbox-paired) === -->
<!--
  Checkbox is the interactive element; swatch provides the visual key.
  aria-checked / aria-label on the checkbox row.
-->
<label class="ps-swatch-filter">
  <input type="checkbox" class="ps-swatch-filter__checkbox" checked
         aria-label="Filter by Department family">
  <span class="ps-swatch ps-swatch--department" aria-hidden="true">
    <span class="ps-swatch__dot"></span>
    <span class="ps-swatch__label">Department</span>
  </span>
</label>


<!-- === CSS TOKENS (reference) === -->
<style>
/*
  Primitive: brand-family palette (values in tokens/dtcg-bundle.json)
  var(--ps-brand-family-department-color)     #0B5FFF  azure-blue
  var(--ps-brand-family-hardware-color)       #FF6B00  construction-orange
  var(--ps-brand-family-warehouse-club-color) #00875A  warehouse-green
*/

.ps-swatch {
  display: inline-flex;
  align-items: center;
  gap: var(--ps-swatch-gap, var(--ps-spacing-04));
  padding: var(--ps-swatch-padding, 4px 8px);
  border-radius: var(--ps-swatch-border-radius, 4px);
  font: var(--ps-swatch-label-font, var(--ps-body-compact-02));
}

.ps-swatch__dot {
  width: var(--ps-swatch-dot-size, 12px);
  height: var(--ps-swatch-dot-size, 12px);
  border-radius: 50%;
  flex-shrink: 0;
}

.ps-swatch--department .ps-swatch__dot {
  background-color: var(--ps-brand-family-department-color, #0B5FFF);
}
.ps-swatch--hardware .ps-swatch__dot {
  background-color: var(--ps-brand-family-hardware-color, #FF6B00);
}
.ps-swatch--warehouse-club .ps-swatch__dot {
  background-color: var(--ps-brand-family-warehouse-club-color, #00875A);
}

/* Map-marker variant: larger dot, no label */
.ps-swatch--map-marker .ps-swatch__dot {
  width: var(--ps-swatch-dot-size-marker, 24px);
  height: var(--ps-swatch-dot-size-marker, 24px);
}

/* High-contrast mode: dots collapse to link colour; labels remain */
@media (forced-colors: active) {
  .ps-swatch__dot {
    background-color: LinkText;
    forced-color-adjust: none;
  }
}
</style>
