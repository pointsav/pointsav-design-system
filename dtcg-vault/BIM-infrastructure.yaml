# BIM — Design System Infrastructure Spatial Mapping

This BIM artifact defines the structural and spatial layout of the PointSav Design System CMS and its underlying vault.

## Spatial Hierarchy

1. **Vault Root (`/`)**
   - **L0: Versioning Layer** (`.git`)
   - **L1: Atomic Tokens** (`tokens/`)
   - **L2: Thematic Semantic Layer** (`themes/`)
   - **L3: Framework-Agnostic Recipes** (`components/`)
   - **L4: Rationale Tier** (`research/`)
   - **L5: Derived Exports** (`exports/`)

## Infrastructure Nodes

| Node | Functional Purpose | Spatial Destination |
| :--- | :--- | :--- |
| **Axum Engine** | Server-side rendering and logic. | `/usr/local/bin/app-privategit-design` |
| **Vault Store** | Canonical source of truth. | `/srv/foundry/deployments/vault-privategit-design-1/` |
| **Audit Ledger** | WORM append-only log. | `service-fs/ledger` |
